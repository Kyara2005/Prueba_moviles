<ion-header>
  <ion-toolbar>
    <ion-title>Libros Explorer</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <!-- Lista de libros -->

  <ion-list>

    <ion-item *ngFor="let item of books">

      <ion-avatar slot="start">
        <img [src]="item.image">
      </ion-avatar>

      <ion-label>
        {{ item.name }}
      </ion-label>

    </ion-item>

  </ion-list>

  <ion-spinner
    *ngIf="loading"
    class="loading-spinner">
  </ion-spinner>

</ion-content>
